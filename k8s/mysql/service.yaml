mysql:
  image: mysql:8
  container_name: mysql
  restart: always

  environment:
    MYSQL_ROOT_PASSWORD: root
    MYSQL_DATABASE: ecommerce

  ports:
    - "3306:3306"

  volumes:
    - mysql_data:/var/lib/mysql
    - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql

  healthcheck:
    test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
    timeout: 20s
    retries: 10