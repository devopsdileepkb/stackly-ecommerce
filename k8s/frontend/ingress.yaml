apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend
  namespace: stackly
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: stackly.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
