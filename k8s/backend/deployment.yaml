apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend
        image: 960862432033.dkr.ecr.ap-south-1.amazonaws.com/backend:latest

        ports:
        - containerPort: 5000

        env:
        - name: DB_HOST
          value: "your-rds-endpoint.amazonaws.com"

        - name: DB_USER
          value: "admin"

        - name: DB_PASSWORD
          value: "your-password"

        - name: DB_NAME
          value: "ecommerce"

        - name: DB_PORT
          value: "3306"